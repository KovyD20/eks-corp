apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: backend

      containers:
        - name: backend
          image: 554422868760.dkr.ecr.eu-west-3.amazonaws.com/eks-corp-prod-backend:v2.0.0
          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: "production"
            - name: AWS_REGION
              value: "eu-west-3"
            - name: DB_SECRET_ARN
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: db_secret_arn
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: s3_bucket_name

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3